<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吉林农业大学 - 优质视频合集</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>吉林农业大学</h1>
        <p>精选优质校园视频，带您领略不一样的农大风采</p>
    </header>

    <main class="container">
        <div class="search-section">
            <input type="text" id="search-input" placeholder="搜索视频、作者或关键词..." aria-label="搜索视频">
            <div class="search-icons">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
        </div>
        <div id="video-grid" class="video-grid">
            <!-- Videos will be injected here by script.js -->
        </div>
    </main>

    <footer>
        <p>&copy; 2026 吉林农业大学视频研究合集. 所有视频版权归原作者所有。</p>
    </footer>

    <script src="script.js"></script>
